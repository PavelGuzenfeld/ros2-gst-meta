name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  # ---------------------------------------------------------------------------
  # Run full test suite before release
  # ---------------------------------------------------------------------------
  unit-tests:
    runs-on: ubuntu-latest
    container:
      image: ros:jazzy
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          apt-get update && apt-get install -y --no-install-recommends \
            build-essential \
            cmake \
            git \
            pkg-config \
            libgstreamer1.0-dev \
            libgstreamer-plugins-base1.0-dev \
            gstreamer1.0-tools

      - name: Build and test
        shell: bash
        run: |
          source /opt/ros/jazzy/setup.bash
          cmake -B build -S . \
            -DCMAKE_BUILD_TYPE=Release \
            -DROS2_GST_META_BUILD_TESTS=ON
          cmake --build build --parallel "$(nproc)"
          cd build && ctest --output-on-failure --timeout 60

  e2e:
    runs-on: ubuntu-latest
    needs: unit-tests
    steps:
      - uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -t ros2-gst-meta-test .

      - name: Run E2E tests
        run: docker run --rm ros2-gst-meta-test

  # ---------------------------------------------------------------------------
  # Create GitHub release
  # ---------------------------------------------------------------------------
  release:
    runs-on: ubuntu-latest
    needs: [unit-tests, e2e]
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Create source tarball
        run: |
          TAG="${GITHUB_REF_NAME}"
          git archive --format=tar.gz --prefix="ros2-gst-meta-${TAG}/" \
            -o "ros2-gst-meta-${TAG}.tar.gz" HEAD

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: ros2-gst-meta-*.tar.gz
